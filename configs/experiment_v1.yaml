# All timing values are in nanoseconds unless noted.

hardware:
  host: "192.168.1.100"     # Red Pitaya IP on the lab network
  port: 5000
  channel: "CH1"
  decimation: 1             # 1 = full 125 MHz sample rate (8 ns/sample)
  buffer_size: 1024         # samples per acquisition
  trigger_level: 0.1        # V — threshold for TLU trigger detection
  trigger_delay: 0          # samples to store before trigger point
  xcet1_source: 2           # SCPI source index for XCET-1 (pion/electron Cherenkov)
  xcet2_source: 3           # SCPI source index for XCET-2 (kaon Cherenkov threshold)
  calorimeter_source: 4     # SCPI source index for lead-glass calorimeter
  calorimeter_threshold: 0.30  # V — minimum calorimeter pulse for EM identification

simulation:
  use_simulation: true      # set false when Red Pitaya is physically connected
  sample_rate_mhz: 125.0
  noise_sigma_frac: 0.02    # 2% of peak amplitude
  electron_fraction: 0.08   # ~8% electrons at typical T9 momenta
  kaon_fraction: 0.015      # ~1.5% kaons at typical T9 momenta
  onset_jitter_samples: 5   # uniform ±N samples of timing jitter on the pulse onset

pulse_shapes:
  electron:
    amplitude_v: 0.8
    amplitude_spread_frac: 0.10   # Gaussian spread — EM showers are relatively uniform
    rise_ns: 1.5
    decay_ns: 20.0
  pion:
    amplitude_v: 0.6
    amplitude_spread_frac: 0.30   # LogNormal spread — Landau distribution for MIPs
    rise_ns: 3.0
    decay_ns: 45.0
  kaon:
    amplitude_v: 0.65
    amplitude_spread_frac: 0.25   # LogNormal — heavier hadron, broader hadronic shower
    rise_ns: 5.0                  # slower rise than pion due to hadronic shower development
    decay_ns: 80.0                # extended tail from heavier hadronic cascade

model:
  path: "models/xgbpid.json"
  labels:
    0: "pion"
    1: "electron"
    2: "kaon"
  confidence_threshold: 0.70

processing:
  pileup_threshold_v: 0.050   # minimum voltage for a real pulse (V); tune to noise floor at CERN
  pileup_min_width: 5          # minimum consecutive samples above threshold to count as a second pulse
  rise_low_frac: 0.10          # lower bound for rise-time measurement (fraction of peak)
  rise_high_frac: 0.90         # upper bound for rise-time measurement
  baseline_window: 50          # number of pre-trigger samples used to estimate baseline

logging:
  level: "INFO"
  output_dir: "data/runs"

dashboard:
  refresh_seconds: 2           # default auto-refresh interval shown in sidebar
  latency_window_events: 500   # default number of events in rolling latency plot
  flush_interval: 50           # write live_telemetry.parquet every N accepted events
  rolling_window: 10000        # maximum rows kept in the live telemetry file

validation:
  enabled: true
  window: 500                     # rolling window size for accuracy and PRF metrics
  target_electron_efficiency: 0.90  # ε_e target for pion rejection factor calculation

retraining:
  interval_seconds: 60    # retrain every N seconds; lower this to make the model update faster
  n_events: 30000         # training set size per cycle (simulation mode)
